<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>استخدام نیرو | نظم‌آفرینان نهاوند</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Tahoma,sans-serif;
        }

        body{
            background:#08111f;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{

            width:450px;
            background:white;
            border-radius:15px;
            padding:35px;
            box-shadow:0 15px 35px rgba(0,0,0,.35);

        }

        h2{

            text-align:center;
            color:#003366;
            margin-bottom:25px;

        }

        input,
        textarea{

            width:100%;
            padding:13px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
            outline:none;

        }

        textarea{

            resize:none;
            height:120px;

        }

        input:focus,
        textarea:focus{

            border-color:#0066cc;

        }

        button{

            width:100%;
            padding:14px;
            background:#0066cc;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:.3s;

        }

        button:hover{

            background:#004999;

        }

        .success{

            background:#d4edda;
            color:#155724;
            border:1px solid #28a745;
            padding:12px;
            border-radius:8px;
            margin-bottom:20px;
            text-align:center;

        }

    </style>

</head>

<body>

<div class="card">

    <h2>فرم استخدام نیرو</h2>

    {% if success %}
        <div class="success">
            ✅ درخواست شما با موفقیت ثبت شد.
        </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input type="text" name="name" placeholder="نام و نام خانوادگی" required>

        <input type="number" name="age" placeholder="سن" required>

        <input type="text" name="phone" placeholder="شماره تماس" required>

        <textarea name="experience" placeholder="سوابق کاری" required></textarea>

        <button type="submit">
            ثبت درخواست
        </button>

    </form>

</div>

</body>
</html>
