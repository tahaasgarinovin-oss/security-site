<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظم‌آفرینان نهاوند</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:tahoma;
        }

        body{
            background:#0b0f1a;
            color:white;
        }

        /* NAVBAR */
        .nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 50px;
            background:#0f172a;
            position:sticky;
            top:0;
        }

        .nav h2{
            color:#00bfff;
        }

        .nav a{
            color:white;
            text-decoration:none;
            margin:0 10px;
            padding:8px 15px;
            border-radius:6px;
        }

        .nav a:hover{
            background:#00bfff;
            color:black;
        }

        /* HERO */
        .hero{
            height:90vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
        }

        .hero h1{
            font-size:50px;
            color:#00bfff;
        }

        .hero p{
            margin-top:10px;
            font-size:18px;
            color:#ccc;
        }

        .btn{
            margin-top:20px;
        }

        .btn a{
            background:#00bfff;
            color:black;
            padding:12px 20px;
            text-decoration:none;
            margin:10px;
            border-radius:8px;
            font-weight:bold;
        }

        .btn a:hover{
            background:white;
        }

        /* CARDS */
        .services{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            margin-top:50px;
        }

        .card{
            background:#111827;
            width:250px;
            margin:10px;
            padding:20px;
            border-radius:10px;
            text-align:center;
            border:1px solid #1f2937;
        }

        .card h3{
            color:#00bfff;
            margin-bottom:10px;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->
<div class="nav">
    <h2>نظم‌آفرینان</h2>

    <div>
        <a href="/">خانه</a>
        <a href="/apply/">استخدام</a>
        <a href="#services">خدمات</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>نظم‌آفرینان نهاوند</h1>
    <p>تأمین امنیت، آرامش و اعتماد</p>

    <div class="btn">
        <a href="/apply/">درخواست نیرو</a>
    </div>
</div>

<!-- SERVICES -->
<div class="services" id="services">

    <div class="card">
        <h3>نگهبانی</h3>
        <p>حفاظت از اماکن خصوصی و دولتی</p>
    </div>

    <div class="card">
        <h3>گشت امنیتی</h3>
        <p>کنترل و گشت‌زنی شبانه‌روزی</p>
    </div>

    <div class="card">
        <h3>مشاوره امنیت</h3>
        <p>طراحی سیستم‌های امنیتی حرفه‌ای</p>
    </div>

</div>

</body>
</html>
